<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inschrijven voor race</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-body">
  <div class="landing-bg"></div>
  <div class="landing-shell narrow">
    <section class="registration-card">
      <a class="back-link" href="index.html">← Terug naar home</a>
      <p class="eyebrow">Zware Jongens Competitie</p>
      <h1>🏁 Inschrijven voor race</h1>
      <p class="form-help">Kies een open concept-race en vul je gegevens in. Je inschrijving komt direct in het adminpaneel te staan.</p>

      <div class="field">
        <label for="raceSelect">Race</label>
        <select id="raceSelect"></select>
      </div>

      <div class="field">
        <label for="naam">Naam</label>
        <input id="naam" type="text" placeholder="Bijv. Sander Weggen" />
      </div>

      <div class="field">
        <label for="email">E-mailadres</label>
        <input id="email" type="email" placeholder="naam@voorbeeld.nl" />
      </div>

      <div class="field">
        <label for="telefoon">Telefoon</label>
        <input id="telefoon" type="text" placeholder="06..." />
      </div>

      <div class="landing-actions">
        <button id="submitBtn" class="btn btn-primary" type="button">Inschrijven</button>
        <a class="btn btn-secondary" href="public.html">Bekijk tussenstand</a>
      </div>

      <p id="message" class="message"></p>
    </section>
  </div>

  <script type="module" src="inschrijven.js"></script>
</body>
</html>
